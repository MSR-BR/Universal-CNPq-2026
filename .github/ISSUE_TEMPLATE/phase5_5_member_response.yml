name: "Resposta - proposta Universal CNPq 2026"
description: "Aprovacao, contribuicao, orcamento e comentarios gerais."
title: "Resposta Fase 5.5"
labels:
  - phase-5-5-response
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por avaliar a proposta resumida.

        A arquitetura cientifica ja esta proposta. Use este formulario apenas para:
        aprovar ou indicar ajuste essencial, informar seu eixo de contribuicao,
        registrar itens de orcamento e deixar comentarios gerais.

        A proposta sera submetida na Faixa C da Chamada Universal CNPq 2026:
        limite total de R$ 250.000,00 para custeio, capital e/ou no maximo
        1 bolsa IC, ITI ou AT. Nao ha bolsa PDJ/PDS na Faixa C.

  - type: dropdown
    id: integrante
    attributes:
      label: Integrante
      description: Lista restrita aos participantes brasileiros nao discentes nesta rodada.
      options:
        - "Bruno de Pinho Alho - UERJ"
        - "Paula de Oliveira Ribeiro Alho - UERJ"
        - "Pedro Jorge von Ranke Perlingeiro - UERJ"
        - "Vinicius da Silva Ramos de Sousa - UERJ"
        - "Mario de Souza Reis Junior - UFF"
        - "Vinicius Gomes de Paula - UFF"
        - "Clebson dos Santos Cruz - UFOB"
        - "Wanisson Silva Santana - UFOB"
        - "Maron Freitas Anka - SENAI CIMATEC"
    validations:
      required: true

  - type: dropdown
    id: avaliacao_geral
    attributes:
      label: Avaliacao geral da proposta
      description: Escolha a opcao mais proxima.
      options:
        - "Aprovada como esta"
        - "Aprovada com ajustes menores"
        - "Precisa de discussao antes da redacao final"
    validations:
      required: true

  - type: checkboxes
    id: eixos
    attributes:
      label: Eixos em que pretende contribuir
      description: Marque apenas os eixos nos quais voce espera contribuir diretamente.
      options:
        - label: "Eixo 1 - Plataforma de complexos metalicos"
        - label: "Eixo 2 - Efeito barocalorico em transicoes spin crossover"
        - label: "Eixo 3 - Pressao, estrutura e interacao de troca J"
        - label: "Eixo 4 - Termodinamica quantica e baterias quanticas"
        - label: "Eixo 5 - Recursos quanticos e metricas de informacao"
        - label: "Apoio transversal - infraestrutura, formacao, medidas, computacao ou gestao cientifica"

  - type: textarea
    id: orcamento
    attributes:
      label: Orcamento - campos do CNPq para Faixa C
      description: Informe apenas itens necessarios ou recomendaveis. Se nao houver demanda, escreva "sem demanda".
      placeholder: |
        Limite da proposta na Faixa C: R$ 250.000,00 no total, somando custeio, capital e/ou no maximo 1 bolsa IC/ITI/AT.

        Use uma linha por item. Mantenha os campos abaixo porque eles correspondem ao formulario CNPq.

        | Rubrica CNPq | Item de dispendio | Valor total estimado (R$) | Detalhamento Pt | Detalhamento En | Justificativa Pt | Justificativa En | Eixo | Instituicao/Subgrupo | Prioridade |
        | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |
        | Custeio | Material de consumo | 0,00 |  |  |  |  | Eixo 1 |  | Alta/Media/Baixa |
        | Custeio | Passagens (Total) | 0,00 |  |  |  |  | Eixo 2 |  | Alta/Media/Baixa |
        | Custeio | Diarias (Total) | 0,00 |  |  |  |  | Eixo 2 |  | Alta/Media/Baixa |
        | Custeio | Servicos de Terceiros (Total) | 0,00 | preenchimento nao requerido no formulario CNPq | preenchimento nao requerido no formulario CNPq | preenchimento nao requerido no formulario CNPq | preenchimento nao requerido no formulario CNPq |  |  |  |
        | Custeio | Despesas acessorias com importacao | 0,00 |  |  |  |  |  |  |  |
        | Capital | Equipamentos e Material permanente | 0,00 |  |  |  |  |  |  |  |
        | Capital | Material bibliografico (Total) | 0,00 | preenchimento nao requerido no formulario CNPq | preenchimento nao requerido no formulario CNPq | preenchimento nao requerido no formulario CNPq | preenchimento nao requerido no formulario CNPq |  |  |  |

        Bolsa, se houver proposta do subgrupo:
        Modalidade IC/ITI/AT:
        Duracao em meses:
        Quantidade de bolsas:
        Valor unitario estimado:
        Valor total estimado:
        Justificativa:

        Observacoes:
        - Na Faixa C so e permitida no maximo 1 bolsa IC, ITI ou AT no projeto inteiro.
        - O coordenador nao pode atribuir bolsa a si mesmo.
        - Valores finais serao consolidados pela coordenacao dentro do limite de R$ 250.000,00.
    validations:
      required: true

  - type: textarea
    id: comentarios_gerais
    attributes:
      label: Comentarios gerais
      description: Informe correcoes essenciais, sugestoes, observacoes de orcamento ou restricoes criticas. A coordenacao separara por secao depois.
      placeholder: "Comentarios gerais, se houver."

  - type: checkboxes
    id: autorizacao
    attributes:
      label: Autorizacao de uso
      description: Confirmacao para usar a resposta na consolidacao da proposta.
      options:
        - label: "Autorizo o uso das informacoes acima na preparacao da proposta Universal CNPq 2026."
          required: true
