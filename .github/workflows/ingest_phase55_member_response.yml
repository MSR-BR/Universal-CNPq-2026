name: Ingest Phase 5.5 Member Response

on:
  issues:
    types:
      - opened
      - edited
      - reopened

concurrency:
  group: phase55-member-response-ingest
  cancel-in-progress: false

permissions:
  contents: write
  issues: read

jobs:
  ingest:
    if: contains(github.event.issue.labels.*.name, 'phase-5-5-response') || startsWith(github.event.issue.title, 'Resposta Fase 5.5 -')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Synchronize main
        run: git pull --rebase origin main

      - name: Ingest issue response
        run: python3 .github/scripts/ingest_phase55_response.py

      - name: Commit response file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/phase5_5_member_responses
          if git diff --cached --quiet; then
            echo "No response changes to commit."
          else
            git commit -m "Ingest phase 5.5 member response #${{ github.event.issue.number }}"
            git push
          fi
